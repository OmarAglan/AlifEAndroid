name: taif
description: "مُحرر لغة ألف"
publish_to: none
version: 1.1.0

environment:
    sdk: ">=3.11.0 <4.0.0"

dependencies:
    code_forge:
        git:
            url: https://github.com/heckmon/code_forge.git
            ref: main
    file_saver: ^0.3.1
    flutter:
        sdk: flutter
    flutter_code_editor: ^0.3.5
    flutter_localizations:
        sdk: flutter
    fluttertoast: ^9.0.0
    highlight: ^0.7.0
    http: ^1.6.0
    input_quantity: ^2.5.2
    lucide_icons_flutter: ^3.1.9
    ota_update: ^7.1.0
    package_info_plus: ^9.0.0
    path: ^1.9.1
    path_provider: ^2.1.5
    permission_handler: ^12.0.1
    provider: ^6.1.5+1
    re_highlight: ^0.0.3
    share_plus: ^12.0.2
    shared_preferences: ^2.5.4
    url_launcher: ^6.3.2
    vibration: ^3.1.8

dev_dependencies:
    flutter_lints: ^5.0.0
    flutter_test:
        sdk: flutter

flutter:
    uses-material-design: true

    assets:
        - assets/
        - assets/examples/
        - assets/aliflang/
        - assets/aliflang/library/
        - assets/aliflang/arm64-v8a/alif_lsp
        - assets/aliflang/arm64-v8a/libalif.so
        - assets/aliflang/arm64-v8a/libc++_shared.so
        - assets/aliflang/linux/alif/amd64

    fonts:
        - family: tajawal
          fonts:
              - asset: assets/fonts/tajawal.ttf
        - family: noto_kufi
          fonts:
              - asset: assets/fonts/noto_kufi_arabic_regular.ttf
        - family: kawkab
          fonts:
              - asset: assets/fonts/kawkab_mono_regular.ttf
        - family: hasubi
          fonts:
              - asset: assets/fonts/hasubi_mono.ttf
        - family: alaq_halab
          fonts:
              - asset: assets/fonts/alaq_halab.otf

flutter_intl:
    enabled: true
